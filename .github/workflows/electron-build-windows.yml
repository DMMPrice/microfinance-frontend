name: Build & Release Electron App (Windows - EXE Only)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ✅ Auto bump VERSION + package.json + package-lock.json, commit and tag
      - name: Bump version, commit, and tag
        shell: pwsh
        run: |
          if (!(Test-Path VERSION)) { "Create VERSION file with 1.0.0 first"; exit 1 }
          if (!(Test-Path package.json)) { "package.json not found"; exit 1 }

          $bump = "${{ inputs.bump }}"
          $old = (Get-Content VERSION -Raw).Trim()

          if ($old -notmatch '^\d+\.\d+\.\d+$') { "VERSION must be like 1.0.0, got: $old"; exit 1 }

          $parts = $old.Split(".") | ForEach-Object { [int]$_ }
          $major = $parts[0]; $minor = $parts[1]; $patch = $parts[2]

          if ($bump -eq "major") { $major++; $minor=0; $patch=0 }
          elseif ($bump -eq "minor") { $minor++; $patch=0 }
          else { $patch++ }

          $new = "$major.$minor.$patch"

          # Update VERSION file
          Set-Content VERSION $new -NoNewline

          # Update package.json version (and package-lock.json)
          npm version $new --no-git-tag-version

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add VERSION package.json package-lock.json
          git commit -m "release: v$new"

          git tag "v$new"
          git push origin HEAD
          git push origin "v$new"

          "TAG=v$new" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VER=$new"  | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci

      - name: Build Windows EXE
        shell: pwsh
        run: |
          npm run build:win

      # ✅ Verify ICU + locales exist in unpacked output (prevents ICU crash)
      - name: Verify ICU/locales exist
        shell: pwsh
        run: |
          $unpacked = Get-ChildItem -Path release -Recurse -Directory |
            Where-Object { $_.Name -match "win-unpacked" } |
            Select-Object -First 1

          if (-not $unpacked) { Write-Error "win-unpacked not found in release"; exit 1 }

          $icu = Join-Path $unpacked.FullName "icudtl.dat"
          $loc = Join-Path $unpacked.FullName "locales"

          if (!(Test-Path $icu)) { Write-Error "Missing icudtl.dat at $icu"; exit 1 }
          if (!(Test-Path $loc)) { Write-Error "Missing locales folder at $loc"; exit 1 }

          $pak = (Get-ChildItem $loc -Filter *.pak -File -ErrorAction SilentlyContinue).Count
          if ($pak -lt 5) { Write-Error "Too few locale .pak files: $pak"; exit 1 }

          Write-Host "✅ ICU/locales OK. pakCount=$pak"

      # ✅ Find ONLY the NSIS installer EXE (Setup) from release folder
      - name: Locate Installer EXE (Setup only)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Recurse -File -Filter "Micro-Finance-Setup-*.exe" |
            Where-Object { $_.FullName -notmatch "win-unpacked" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $exe) { Write-Error "No Setup EXE found in release!"; exit 1 }

          Write-Host "Found Setup EXE: $($exe.FullName)"
          "EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ✅ Create release and upload ONLY the EXE
      - name: Create GitHub Release (EXE Only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Micro Finance App ${{ env.TAG }}
          generate_release_notes: true
          files: ${{ env.EXE_PATH }}